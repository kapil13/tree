name: byot_mobile
description: BYOT — Bring Your Own Tree (Flutter Android + iOS)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State & routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Network & data
  dio: ^5.5.0
  retrofit: ^4.1.0
  json_annotation: ^4.9.0
  shared_preferences: ^2.2.3

  # Device
  geolocator: ^12.0.0
  camera: ^0.11.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  record: ^5.1.2
  path_provider: ^2.1.4

  # Map (OpenStreetMap tiles — no API key required)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  # Charts
  fl_chart: ^0.68.0
  # Auth
  google_sign_in: ^6.2.1
  # Misc UI
  cached_network_image: ^3.3.1
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  retrofit_generator: ^9.1.2
  json_serializable: ^6.8.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
