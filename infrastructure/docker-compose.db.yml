# Minimal DB stack for native Mac dev (backend/frontend run on host).
# PostGIS works out of the box — no Homebrew postgis headaches.
#
#   ./scripts/dev-db-start.sh
#
# Then set backend/.env:
#   DATABASE_URL=postgresql+asyncpg://byot:byot@localhost:5433/byot
#   DATABASE_URL_SYNC=postgresql+psycopg2://byot:byot@localhost:5433/byot
#   REDIS_URL=redis://localhost:6379/0

name: byot-db

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: byot
      POSTGRES_PASSWORD: byot
      POSTGRES_DB: byot
    ports: ["5433:5432"]
    volumes:
      - byot-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U byot -d byot"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

volumes:
  byot-pg-data:
