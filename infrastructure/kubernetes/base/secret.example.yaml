# Example only — in production use AWS Secrets Manager + External Secrets Operator.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: byot
type: Opaque
stringData:
  DATABASE_URL: postgresql+asyncpg://byot:CHANGEME@byot-prod-pg.xxxx.rds.amazonaws.com:5432/byot
  DATABASE_URL_SYNC: postgresql+psycopg2://byot:CHANGEME@byot-prod-pg.xxxx.rds.amazonaws.com:5432/byot
  REDIS_URL: rediss://byot-prod-redis.xxxx.cache.amazonaws.com:6379/0
  JWT_SECRET: REPLACE_WITH_LONG_RANDOM_STRING
  OPENAI_API_KEY: ""
  GEMINI_API_KEY: ""
  SENTINEL_HUB_CLIENT_ID: ""
  SENTINEL_HUB_CLIENT_SECRET: ""
  SENTINEL_HUB_API_URL: "https://sh.dataspace.copernicus.eu"
  SENTINEL_HUB_TOKEN_URL: "https://identity.dataspace.copernicus.eu/auth/realms/CDSE/protocol/openid-connect/token"
