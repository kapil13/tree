apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: byot
  labels: { app: backend-api }
spec:
  replicas: 3
  selector:
    matchLabels: { app: backend-api }
  template:
    metadata:
      labels: { app: backend-api }
    spec:
      containers:
        - name: api
          image: ghcr.io/byot/backend:latest
          ports:
            - { name: http, containerPort: 8000 }
          envFrom:
            - secretRef: { name: backend-secrets }
            - configMapRef: { name: backend-config }
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits:   { cpu: "1500m", memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: byot
spec:
  selector: { app: backend-api }
  ports:
    - { name: http, port: 80, targetPort: 8000 }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-api
  namespace: byot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-api
  namespace: byot
spec:
  minAvailable: 2
  selector: { matchLabels: { app: backend-api } }
