apiVersion: batch/v1
kind: Job
metadata:
  name: alembic-upgrade
  namespace: byot
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/byot/backend:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef: { name: backend-secrets }
            - configMapRef: { name: backend-config }
