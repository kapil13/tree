apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: byot
resources:
  - ../../base
patches:
  - target: { kind: Deployment, name: backend-api }
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 5
  - target: { kind: HorizontalPodAutoscaler, name: backend-api }
    patch: |-
      - op: replace
        path: /spec/maxReplicas
        value: 40
  - target: { kind: Deployment, name: backend-worker }
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 6
