name: byot

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: byot
      POSTGRES_PASSWORD: byot
      POSTGRES_DB: byot
    ports: ["5432:5432"]
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U byot -d byot"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: byotadmin
      MINIO_ROOT_PASSWORD: byotadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 byotadmin byotadmin123; do sleep 2; done;
      mc mb --ignore-existing local/byot-media;
      exit 0;
      "

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://byot:byot@postgres:5432/byot
      DATABASE_URL_SYNC: postgresql+psycopg2://byot:byot@postgres:5432/byot
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-not-for-production
      CORS_ORIGINS: http://localhost:3000
      S3_BUCKET_MEDIA: byot-media
      S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: byotadmin
      AWS_SECRET_ACCESS_KEY: byotadmin123
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports: ["8000:8000"]
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ../backend:/app

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    ports: ["3000:3000"]

volumes:
  pg-data:
  minio-data:
