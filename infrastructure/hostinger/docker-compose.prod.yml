# BYOT production stack for Hostinger KVM 4 (4 vCPU, 16 GB RAM, 200 GB NVMe)
#
# Usage (on VPS, from repo root):
#   cp infrastructure/hostinger/.env.production.example infrastructure/hostinger/.env.production
#   # edit .env.production with secrets and domain
#   docker compose -f infrastructure/hostinger/docker-compose.prod.yml --env-file infrastructure/hostinger/.env.production up -d --build
#
# Requires: Docker Engine 24+ and Docker Compose v2

name: byot-prod

services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-byot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-byot}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-byot} -d ${POSTGRES_DB:-byot}"]
      interval: 10s
      timeout: 5s
      retries: 12
    deploy:
      resources:
        limits:
          memory: 3G
    # Do not publish 5432 to the host — DB is internal only.

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384M

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET_MEDIA: ${S3_BUCKET_MEDIA:-byot-media}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$S3_BUCKET_MEDIA &&
      exit 0
      "
    restart: "no"

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-byot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-byot}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-byot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-byot}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET_MEDIA: ${S3_BUCKET_MEDIA:-byot-media}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL:-}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1536M

  worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./worker-entrypoint.sh:/worker-entrypoint.sh:ro
      - ${PERCH_MODEL_HOST_DIR:-/opt/aranyix/models}:/opt/aranyix/models:ro
    entrypoint: ["/bin/sh", "/worker-entrypoint.sh"]
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-byot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-byot}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-byot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-byot}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET_MEDIA: ${S3_BUCKET_MEDIA:-byot-media}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      backend:
        condition: service_healthy
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_app",
        "worker",
        "-l",
        "info",
        "-Q",
        "default,ai,satellite,carbon,notifications,bioacoustic",
        "--concurrency",
        "2",
      ]
    deploy:
      resources:
        limits:
          memory: 2560M

  beat:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./worker-entrypoint.sh:/worker-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/worker-entrypoint.sh"]
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      worker:
        condition: service_started
    command: ["celery", "-A", "app.workers.celery_app", "beat", "-l", "info"]
    deploy:
      resources:
        limits:
          memory: 256M

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        API_PROXY_TARGET: http://backend:8000
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          memory: 768M

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?set APP_DOMAIN}
      API_DOMAIN: ${API_DOMAIN:?set API_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  pg-data:
  redis-data:
  minio-data:
  caddy-data:
  caddy-config:
