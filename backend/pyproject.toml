[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E","F","W","I","B","UP","SIM","C4","TID","RUF"]
# UP042 nudges to StrEnum — we keep py3.10-compatible style.
ignore = ["E501", "UP042", "RUF001", "RUF002", "RUF003", "RUF012", "B008"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-ra --strict-markers"

[tool.mypy]
python_version = "3.12"
strict = false
plugins = ["pydantic.mypy"]
ignore_missing_imports = true
