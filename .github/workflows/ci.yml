name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: byot
          POSTGRES_PASSWORD: byot
          POSTGRES_DB: byot_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U byot -d byot_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install
        working-directory: backend
        run: |
          python -m pip install -U pip
          pip install -r requirements-dev.txt
      - name: Lint
        working-directory: backend
        run: ruff check .
      - name: Test
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://byot:byot@localhost:5432/byot_test
          DATABASE_URL_SYNC: postgresql+psycopg2://byot:byot@localhost:5432/byot_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci-only-secret
          APP_ENV: test
        run: pytest -q

  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json
      - name: Install
        working-directory: frontend
        run: npm install --legacy-peer-deps --no-audit --no-fund
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.example.com
        run: npm run build
