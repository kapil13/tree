name: Android APK

on:
  workflow_dispatch:
    inputs:
      byot_api:
        description: "API URL baked into APK (Mac LAN IP for physical phone, e.g. http://192.168.1.42:8000)"
        required: false
        default: "http://10.0.2.2:8000"
  push:
    branches:
      - cursor/android-apk-build-f2ba
      - main

jobs:
  build-apk:
    name: Build release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Android project present
        run: |
          if [ ! -f mobile/android/app/build.gradle.kts ]; then
            echo "::error::mobile/android/ not found. Run this workflow on branch cursor/android-apk-build-f2ba"
            exit 1
          fi

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          # Must match the Flutter version that generated mobile/android/ (AGP 9.x)
          flutter-version: "3.44.5"
          cache: true

      - name: Accept Android SDK licenses
        run: |
          flutter --version
          yes | flutter doctor --android-licenses || true

      - name: Build release APK
        working-directory: mobile
        env:
          BYOT_API: ${{ github.event.inputs.byot_api || 'http://10.0.2.2:8000' }}
        run: |
          flutter pub get
          flutter build apk --release --dart-define="BYOT_API=${BYOT_API}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: byot-android-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Job summary
        env:
          BYOT_API: ${{ github.event.inputs.byot_api || 'http://10.0.2.2:8000' }}
        run: |
          {
            echo "### BYOT Android APK built successfully"
            echo ""
            echo "1. Open this workflow run → **Artifacts** → download \`byot-android-apk\`"
            echo "2. Unzip and install \`app-release.apk\` on your Android phone"
            echo "3. API URL baked in: \`${BYOT_API}\`"
            echo "4. Start backend on your Mac: \`make dev-start\`"
            echo "5. Login: demo@byot.earth / byotdemo1234!"
          } >> "$GITHUB_STEP_SUMMARY"
